{% extends "base.html" %}

{% block title %}
เกี่ยวกับเรา
{% endblock %}

{% block content %}
<style>
  .gallery-wrap{
    max-width: 900px;
    margin: 40px auto;
    padding: 14px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }

  .gallery-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .gallery-item{
    border-radius: 8px;
    overflow: hidden; /* ให้ขอบมนกับรูป */
    background: #f3f3f3;
    aspect-ratio: 16 / 10; /* ให้ภาพแต่ละช่องสูงเท่ากันแบบในรูป */
  }

  .gallery-item img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.2s ease;
  }

  .gallery-item:hover img{
    transform: scale(1.03);
  }

  /* รองรับมือถือ */
  @media (max-width: 700px){
    .gallery-grid{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 420px){
    .gallery-grid{ grid-template-columns: 1fr; }
  }
</style>

<div class="gallery-wrap">
  <div class="gallery-grid">
    <div class="gallery-item">
      <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80" alt="coffee 1">
    </div>
