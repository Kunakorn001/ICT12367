{% extends "base.html" %}

{% block title %}
แบบฟอร์มบันทึกข้อมูลประชากร
{% endblock %}

{% block content %}

<style>
  .form-card{
    width: 520px;
    margin: 50px auto;
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    overflow: hidden;
  }

  .form-header{
    background: #1f6feb;
    color: #fff;
    text-align: center;
    padding: 14px;
    font-size: 22px;
    font-weight: bold;
  }

  .form-body{
    padding: 18px;
  }

  .form-group{
    margin-bottom: 15px;
  }

  .form-group label{
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .form-control{
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
  }

  .btn{
    padding: 8px 14px;
    border: none;
    border-radius: 4px;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  .btn-success{
    background-color: #198754;
  }

  .btn-danger{
    background-color: #dc3545;
  }

  .btn-row{
    margin-top: 10px;
  }
</style>

<div class="form-card">
  <div class="form-header">
    แบบฟอร์มบันทึกข้อมูลประชากร
  </div>

  <div class="form-body">
    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>ชื่อประชากร</label>
        <input type="text" name="name" class="form-control"
               placeholder="กรุณากรอกชื่อ-นามสกุล">
      </div>

      <div class="form-group">
        <label>อายุ</label>
        <input type="number" name="age" class="form-control"
               placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-success">ลงทะเบียน</button>
        <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
