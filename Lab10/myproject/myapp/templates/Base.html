<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}
    {% endblock %}

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #6F4E37;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-cup-hot-fill me-2"></i>ยินดีต้องรับเข้าสู่วิชา ICT12367
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link px-3 active" href="/">หน้าแรก</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/about">เกี่ยวกับเรา</a>
                </li>
                <li class="nav-item ms-lg-3">
                    <a class="nav-link btn btn-outline-light px-4 round-pill" href="/form" style="border-radius: 20px;">
                        ลงทะเบียน
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<style>
    .hero-section {
        background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)),
                    url('https://www.nespresso.com/ecom/medias/sys_master/public/46619125940254/shutterstock-2017631294-1024x683.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        height: 70vh;
        min-height: 500px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .hero-text-box {
        max-width: 900px;
        z-index: 2;
        animation: fadeInUp 1.2s ease-out;
    }

    .hero-section h1 {
        font-size: 4rem;
        text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        letter-spacing: 2px;
    }

    .hero-divider {
        width: 80px;
        height: 4px;
        background-color: #bc8e5c;
        margin: 20px auto;
        border-radius: 2px;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="hero-section text-center shadow-lg">
    <div class="container hero-text-box">
        <i class="bi bi-cup-hot mb-3" style="font-size: 3rem; color: #bc8e5c;"></i>
        
        <h1 class="fw-bold mb-2">ยินดีต้องรับเข้าสู่วิชา ICT12367</h1>
        <div class="hero-divider"></div>
        
        <p class="lead mb-5 fs-4 fw-light" style="opacity: 0.9;">
            
        </p>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <div>
        {% block content %}
        {% endblock%}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> 
</body>
</html>
